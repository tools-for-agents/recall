name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node --test

  # Looking is part of the build now. This tool shipped a phone layout that dragged
  # the page 250px sideways, and controls at 2.4:1, past a green `node --test` — a
  # test suite does not look at the page. iris does: phone, tablet and desktop, in
  # both themes, and it fails here rather than in front of someone.
  look:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # THE GATE WAS LOOKING AT AN EMPTY PAGE.
      #
      # Every one of these UIs is data-driven, and CI was serving it with nothing in it.
      # An empty page cannot overflow, cannot collide, cannot clip and cannot be
      # unreadable — there is nothing on it to be wrong. A UI gate that has never seen a
      # row of real data is not a gate; it is a screenshot of an empty room.
      #
      # (agent-hq's gate had been auditing a blank board for months. It went green every
      # time. The seed script existed; nobody ran it.)
      #
      # So: put something real on the page, and ASSERT it is there before looking.
      - name: Serve it, THEN put something on it
        run: |
          node scripts/seed.js ./.recall-seed
          RECALL_CORTEX_DB=./.recall-seed/brain.db RECALL_SCOUT_DB=./.recall-seed/reading.db RECALL_LENS_DB=./.recall-seed/code.db RECALL_HQ_URL=http://127.0.0.1:9 node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7980/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7980/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).entries ?? 0")
          echo "on the page: entries=$n"
          test "$n" -gt 0 || { echo "::error::entries=0 — iris would be auditing an empty page"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7980/
          viewports: phone,tablet,desktop
          name: recall
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back
