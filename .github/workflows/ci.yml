name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # IN CI, A SKIPPED TEST IS A FAILED TEST.
      #
      # CI is the one place where every dependency is supposed to be present — Docker,
      # Chrome, a network. So a skip here does not mean "not applicable", it means a
      # guard fired that should not have, and a guard that fires wrongly is invisible:
      # nobody reads "skipped".
      #
      # anvil's sandbox tests skipped on EVERY Linux CI run for the life of the project
      # — `pass 11 · fail 0 · skipped 9`, green — because the skip guard probed by
      # running anvil, and anvil was broken. The breakage switched off the tests that
      # would have caught it. This is the net under that.
      - name: run the tests — and none of them may be skipped
        run: |
          node --test 2>&1 | tee "$RUNNER_TEMP/test.txt"
          code=${PIPESTATUS[0]}
          test "$code" -eq 0 || exit $code
          n=$(grep -oE '^# skipped [0-9]+|^. skipped [0-9]+' "$RUNNER_TEMP/test.txt" | grep -oE '[0-9]+$' | head -1)
          echo "skipped: ${n:-0}"
          if [ "${n:-0}" -ne 0 ]; then
            echo "::error::${n} test(s) skipped in CI. Everything they need is installed here — a skip means a guard misfired, and a green build is hiding it."
            exit 1
          fi

  # Looking is part of the build now. This tool shipped a phone layout that dragged
  # the page 250px sideways, and controls at 2.4:1, past a green `node --test` — a
  # test suite does not look at the page. iris does: phone, tablet and desktop, in
  # both themes, and it fails here rather than in front of someone.
  look:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      # THE GATE WAS LOOKING AT AN EMPTY PAGE.
      #
      # Every one of these UIs is data-driven, and CI was serving it with nothing in it.
      # An empty page cannot overflow, cannot collide, cannot clip and cannot be
      # unreadable — there is nothing on it to be wrong. A UI gate that has never seen a
      # row of real data is not a gate; it is a screenshot of an empty room.
      #
      # (agent-hq's gate had been auditing a blank board for months. It went green every
      # time. The seed script existed; nobody ran it.)
      #
      # So: put something real on the page, and ASSERT it is there before looking.
      - name: Serve it, THEN put something on it
        run: |
          node scripts/seed.js ./.recall-seed
          RECALL_CORTEX_DB=./.recall-seed/brain.db RECALL_SCOUT_DB=./.recall-seed/reading.db RECALL_LENS_DB=./.recall-seed/code.db RECALL_HQ_URL=http://127.0.0.1:9 node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7980/api/stats >/dev/null && break; sleep 1; done
          n=$(curl -sf http://localhost:7980/api/stats | node -pe "JSON.parse(require('fs').readFileSync(0)).entries ?? 0")
          echo "on the page: entries=$n"
          test "$n" -gt 0 || { echo "::error::entries=0 — iris would be auditing an empty page"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7980/
          viewports: phone,tablet,desktop
          name: recall
          tokens: kit      # the kit's ONE design system — iris/tokens.json, not a copy
          strict: true     # drift is a regression now; a gate is what keeps it from creeping back

  # THE EMPTY STATE IS THE ONE STATE EVERY USER SEES FIRST.
  #
  # The `look` job seeds data on purpose — a UI gate that has never seen a row of data is a
  # screenshot of an empty room. But that means the EMPTY page stopped being rendered by
  # anything at all, and real bugs were living in it: `scout serve` crashed at startup on a
  # machine with no cache, and lens told a brand-new user their index was "stale" when they
  # had never made one. Both states are audited now, because they are different states.
  first-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: browser-actions/setup-chrome@v1
        id: chrome
      - name: serve it with NOTHING in it, exactly as a new user would
        run: |
          RECALL_CORTEX_DB=/tmp/empty/a.db RECALL_SCOUT_DB=/tmp/empty/b.db RECALL_LENS_DB=/tmp/empty/c.db RECALL_HQ_URL=http://127.0.0.1:9 node src/cli.js serve &
          for i in $(seq 30); do curl -sf http://localhost:7980/api/stats >/dev/null && break; sleep 1; done
          curl -sf http://localhost:7980/api/stats >/dev/null || { echo "::error::the server did not start on an empty store — that is what a new user gets"; exit 1; }
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7980/
          viewports: phone,tablet,desktop
          name: recall-first-run
          tokens: kit

  # ── THE STATES NOTHING EVER RENDERED ──────────────────────────────────────────
  # `test` proves the logic. `look` renders the page WORKING. `first-run` renders it
  # EMPTY. Not one of them has ever rendered a control that cannot be pressed, or a row
  # switched off, or a card blocked — the states you have to DO something to reach.
  #
  # So nobody had ever looked at them, and every single one of them was broken: every
  # disabled control in this kit was unreadable, two of them at 1:1 — the exact colour of
  # their own background — under three green gates. A state that is never rendered is a
  # state that is never checked, and it will rot, quietly, forever.
  #
  # This gate poses the page in those states and audits it there.
  states:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7975 &
          for i in $(seq 30); do curl -sf http://localhost:7975/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7975/
          viewports: desktop
          tokens: kit
          name: states
          pre: >-
            document.querySelectorAll('button,input,select,textarea').forEach(e=>e.disabled=true);document.querySelectorAll('.card').forEach(e=>e.classList.add('blocked'));document.querySelectorAll('#legend .row,.gl-item').forEach(e=>e.classList.add('off'))

  # ── WHAT DOES IT DRAW WHEN THE SERVER SAYS NO? ────────────────────────────────
  # This UI is a shell that asks a server what to render, and it had never once
  # rendered the answer "no". The helper was `fetch(p).then(r => r.json())` — it never
  # looked at `r.ok`, so a 500 with a JSON body came back looking exactly like DATA,
  # `.map` threw halfway through the render, and the page was left a blank shell.
  #
  # The result: when the backend died you were shown AN EMPTY ROOM. Nothing on screen
  # told "the server is down" apart from "you have no data" — and the `first-run` gate
  # PROVES the empty page looks fine, so it went green over it every time.
  #
  # An error state that renders as an empty state is worse than a crash. A crash at
  # least tells you something happened.
  #
  # --boot breaks the API before the app's first line runs; --pre then asserts the app
  # ADMITTED it. A page that quietly renders nothing fails this job.
  dead-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Serve it
        run: |
          node src/cli.js index . || true
          node src/cli.js serve --port 7975 &
          for i in $(seq 30); do curl -sf http://localhost:7975/ >/dev/null && break; sleep 1; done
      - uses: tools-for-agents/iris@main
        with:
          url: http://localhost:7975/
          viewports: desktop
          tokens: kit
          name: dead-api
          boot: >-
            const f=window.fetch;window.fetch=(u,o)=>String(u).includes('/api/')?Promise.resolve(new Response('{"error":"ci"}',{status:500,headers:{'content-type':'application/json'}})):f(u,o);
          pre: >-
            const b=document.getElementById('apidown');if(!b||b.hidden||!b.textContent.trim()) throw new Error('the server said no and the page said NOTHING');
